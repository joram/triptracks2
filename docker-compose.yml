services:
  api:
    build:
      context: ./server
    entrypoint: ["uvicorn", "--host", "0.0.0.0", "--port", "8000", "main:app"]
    environment:
      TT_CONFIG_DIR: /data
      PORT: "8000"
      # Web reads this at build time; API must have the same value at runtime for /oauth/token exchange.
      VEILSTREAM_AUTH_BROKER_URL: ${VEILSTREAM_AUTH_BROKER_URL:-https://auth.veilstream.com}
      REACT_APP_VEILSTREAM_AUTH_BROKER_URL: ${VEILSTREAM_AUTH_BROKER_URL:-https://auth.veilstream.com}
    volumes:
      - triptracks_data:/data
    ports:
      - "8000:8000"
    restart: unless-stopped

  web:
    build:
      context: ./web
      dockerfile: Dockerfile
      args:
        # Same-origin requests; nginx proxies /api to the api service.
        REACT_APP_API_URL: ""
        REACT_APP_VEILSTREAM_AUTH_BROKER_URL: ${VEILSTREAM_AUTH_BROKER_URL:-}
        REACT_APP_OAUTH_CALLBACK_PATH: ${OAUTH_CALLBACK_PATH:-/auth/callback}
    ports:
      - "80:80"
    depends_on:
      - api
    restart: unless-stopped

volumes:
  triptracks_data:
