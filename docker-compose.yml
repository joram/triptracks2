services:
  api:
    build:
      context: ./server
    command: ["uvicorn", "--host", "0.0.0.0", "--port", "8000", "main:app"]
    environment:
      TT_CONFIG_DIR: /data
    volumes:
      - triptracks_data:/data
    expose:
      - "8000"
    restart: unless-stopped

  web:
    build:
      context: ./web
      dockerfile: Dockerfile
      args:
        # Same-origin requests; nginx proxies /api to the api service.
        REACT_APP_API_URL: ""
    ports:
      - "80:80"
    depends_on:
      - api
    restart: unless-stopped

volumes:
  triptracks_data:
