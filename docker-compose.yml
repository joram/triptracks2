services:
  api:
    build:
      context: ./server
    entrypoint: ["uvicorn", "--host", "0.0.0.0", "--port", "8000", "main:app"]
    environment:
      TT_CONFIG_DIR: /data
      PORT: "8000"
      # Plain default — VeilStream does not expand compose ${...} syntax at deploy time.
      # Override on the api service in VeilStream env vars if needed (not just web/build args).
      VEILSTREAM_AUTH_ROUTER_URL: https://auth.veilstream.com
    volumes:
      - triptracks_data:/data
    ports:
      - "8000:8000"
    restart: unless-stopped

  web:
    build:
      context: ./web
      dockerfile: Dockerfile
      args:
        # Same-origin requests; nginx proxies /api to the api service.
        REACT_APP_API_URL: ""
        REACT_APP_VEILSTREAM_AUTH_ROUTER_URL: ${VEILSTREAM_AUTH_ROUTER_URL:-${VEILSTREAM_AUTH_BROKER_URL:-}}
        REACT_APP_OAUTH_CALLBACK_PATH: ${OAUTH_CALLBACK_PATH:-/auth/callback}
    ports:
      - "80:80"
    depends_on:
      - api
    restart: unless-stopped

volumes:
  triptracks_data:
